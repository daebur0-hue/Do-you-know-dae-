  <title>Do You Know Dae?</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body { font-family: 'Press Start 2P', system-ui; }
    .glow-cyan { text-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff; color: #00ffff; }
    .particle { position: absolute; width: 5px; height: 5px; background: #00ffff; border-radius: 50%; box-shadow: 0 0 8px #00ffff; animation: float 10s infinite linear; }
    @keyframes float { 0% { transform: translateY(120vh) rotate(0deg); opacity: 0.7; } 100% { transform: translateY(-100vh) rotate(1080deg); opacity: 0; } }
  </style>
</head>
<body class="bg-black text-white min-h-screen overflow-hidden">

<audio id="bg-music" loop>
  <source src="https://cdn.pixabay.com/audio/2023/01/24/audio_2b5e5d5f5f.mp3" 
    type="audio/mpeg">
</audio>

<div id="start-screen" class="flex flex-col items-center justify-center min-h-screen relative">
  <div id="particles" class="absolute inset-0 pointer-events-none"></div>
  <h1 class="text-6xl md:text-[5.5rem] font-bold mb-6 tracking-[4px] text-center leading-none">DO YOU KNOW<br><span class="glow-cyan">DAE</span>?</h1>
  <div class="flex gap-6">
    <button onclick="startQuiz()" class="px-16 py-8 bg-cyan-400 hover:bg-cyan-300 text-black text-3xl font-bold rounded-2xl transition-all active:scale-95 shadow-[0_0_40px_#22d3ee]">PUSH START</button>
    <button onclick="toggleMusic()" id="music-btn" class="px-6 py-8 bg-zinc-800 hover:bg-zinc-700 text-cyan-400 text-xl font-bold rounded-2xl transition-all">⏸️ PAUSE</button>
  </div>
</div>

<div id="quiz-screen" class="hidden min-h-screen p-6">
  <div class="max-w-2xl mx-auto pt-8">
    <div class="flex justify-between items-center mb-8 text-cyan-400">
      <div>Question <span id="q-num" class="text-3xl font-bold">1</span>/15</div>
      <button onclick="endQuiz()" class="text-red-400 hover:text-red-500 underline">END QUIZ</button>
    </div>
    <div class="bg-zinc-950 border border-cyan-500/40 rounded-3xl p-8 md:p-12">
      <p id="question-text" class="text-xl md:text-2xl leading-relaxed mb-12"></p>
      <div id="options" class="space-y-4"></div>
    </div>
    <div id="feedback" class="mt-6 text-center min-h-[2rem] text-lg"></div>
  </div>
</div>

<div id="results-screen" class="hidden flex flex-col items-center justify-center min-h-screen p-6 text-center">
  <h2 class="text-6xl font-bold mb-4 glow-cyan">HOW WELL YOU KNOW <span class="glow-cyan">DAE</span></h2>
  <div id="score" class="text-[9rem] font-black leading-none text-cyan-400 mb-2"></div>
  <p id="message" class="text-2xl max-w-md mx-auto mb-12"></p>
  <button onclick="restartQuiz()" class="px-12 py-6 bg-cyan-400 hover:bg-cyan-300 text-black text-2xl font-bold rounded-2xl transition-all">RUN IT BACK</button>
</div>

<script>

  {q: "What's Dae's dream job?", a: "idk", opts: ["idk", "Software Engineer", "Athlete", "Streamer"]},
  {q: "What's Dae's favorite video game?", a: "rainbow 6 siege", opts: ["rainbow 6 siege", "Fortnite", "Call of Duty", "2K"]},

  {q: "What's Dae's favorite animal?", a: "elephants", opts: ["elephants", "Lions", "Dogs", "Sloths"]},
  {q: "What's Dae's go-to fast food?", a: "chickenfila", opts: ["chickenfila", "McDonalds", "Wendys", "Taco Bell"]},
  {q: "What's Dae's favorite meme or inside joke?", a: "my bad og", opts: ["my bad og", "Doge", "This is fine", "Spongebob"]},
  {q: "How tall is Dae?", a: "5’9", opts: ["5’9", "6’0", "5’7", "5’11"]},
  {q: "What's Dae's favorite school subject?", a: "math", opts: ["math", "History", "English", "Gym"]},
  {q: "What's one place Dae wants to visit?", a: "any Western Africa beach", opts: ["any Western Africa beach", "Paris", "NYC", "Tokyo"]},
  {q: "What's Dae's favorite snack?", a: "hot fries", opts: ["hot fries", "Doritos", "Skittles", "Popcorn"]},
  {q: "What's Dae's biggest fear?", a: "hitting females", opts: ["hitting females", "Spiders", "Heights", "Failure"]},

  {q: "What's Dae's favorite emoji?", a: "😭", opts: ["😭", "😂", "🔥", "💀"]},
  {q: "What's one skill Dae's proud of?", a: "coding", opts: ["coding", "Basketball", "Cooking", "Dancing"]},

  {q: "What's Dae's favorite ice cream flavor?", a: "Oreo", opts: ["Oreo", "Chocolate", "Vanilla", "Strawberry"]},
  {q: "What's one goal Dae has for next year?", a: "get more money", opts: ["get more money", "Travel", "Get fit", "Learn guitar"]},
  {q: "What's Dae's favorite book?", a: "if only I had told her", opts: ["if only I had told her", "Atomic Habits", "Rich Dad", "The Alchemist"]},
  {q: "What's something Dae's really good at?", a: "self sabotaging", opts: ["self sabotaging", "Gaming", "Math", "Talking"]},
  {q: "What's Dae's favorite outfit style?", a: "lazy sweat pants n crocs", opts: ["lazy sweat pants n crocs", "Streetwear", "Suits", "Athletic"]},
  {q: "What's one thing that always makes Dae laugh?", a: "that one YouTube video", opts: ["that one YouTube video", "Memes", "Friends", "Standup"]},
  {q: "What's Dae's favorite time of day?", a: "nights", opts: ["nights", "Morning", "Afternoon", "Evening"]},
  {q: "What's a talent Dae has?", a: "Clitorovaginal Neuropleasure Specialist", opts: ["Clitorovaginal Neuropleasure Specialist", "Coding", "Basketball", "Drawing"]},
  {q: "What's Dae's dream car?", a: "bmw", opts: ["bmw", "Lamborghini", "Tesla", "Mustang"]},
  {q: "What's something Dae hates doing?", a: "helping people when they don’t try they self first", opts: ["helping people when they don’t try they self first", "Cleaning", "Waking up early", "Math"]},
  {q: "What's Dae's favorite social media?", a: "instagram", opts: ["instagram", "X", "TikTok", "Snap"]},
  {q: "What's one fact about Dae's family?", a: "im the first person with a diploma in my family", opts: ["im the first person with a diploma in my family", "Big family", "Only child", "Has 5 siblings"]},
  {q: "What's Dae's favorite memory from childhood?", a: "8th grade year", opts: ["8th grade year", "First bike", "Family trips", "Sports"]},
  {q: "What's Dae's spirit animal?", a: "sloth", opts: ["sloth", "Lion", "Wolf", "Eagle"]},
  {q: "What's one thing Dae's surprisingly bad at?", a: "reading the room", opts: ["reading the room", "Math", "Sports", "Cooking"]},
  {q: "What's Dae's favorite quote or motto?", a: "horses don’t stop they keep going", opts: ["horses don’t stop they keep going", "Stay hungry", "Hustle", "No pain no gain"]},
  {q: "What's the one question everyone always asks Dae?", a: "are you slow", opts: ["are you slow", "How old are you", "Where you from", "You good?"]}
];

let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let musicPlaying = true;
const audio = document.getElementById('bg-music');

function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (Math.random() * 8 + 7) + 's';
    p.style.animationDelay = '-' + Math.random() * 15 + 's';
    container.appendChild(p);
  }
}

function toggleMusic() {
  if (musicPlaying) {
    audio.pause();
    document.getElementById('music-btn').textContent = '🔊 MUSIC';
  } else {
    audio.play().catch(() => {});
    document.getElementById('music-btn').textContent = '⏸️ PAUSE';
  }
  musicPlaying = !musicPlaying;
}

function startQuiz() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  audio.play().catch(() => {});
  currentQuestions = [...allQuestions].sort(() => 0.5 - Math.random()).slice(0, 15);
  currentIndex = 0;
  score = 0;
  showQuestion();
}

function showQuestion() {
  const q = currentQuestions[currentIndex];
  document.getElementById('q-num').textContent = currentIndex + 1;
  document.getElementById('question-text').innerHTML = q.q.replace(/dae/gi, '<span class="glow-cyan">dae</span>');
  const optsDiv = document.getElementById('options');
  optsDiv.innerHTML = '';
  const shuffled = [...q.opts].sort(() => 0.5 - Math.random());
  shuffled.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = `w-full text-left p-6 rounded-2xl border border-cyan-500/30 hover:border-cyan-400 hover:bg-zinc-900 transition-all text-lg`;
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(opt, q.a);
    optsDiv.appendChild(btn);
  });
}

function selectAnswer(selected, correct) {
  if (selected === correct) score++;
  const fb = document.getElementById('feedback');
  fb.innerHTML = selected === correct ? 
    `<span class="text-green-400">✅ You know dae fr</span>` : 
    `<span class="text-red-400">❌ Wrong. It's <span class="glow-cyan">${correct}</span></span>`;
  setTimeout(() => {
    currentIndex++;
    if (currentIndex < currentQuestions.length) {
      showQuestion();
      fb.innerHTML = '';
    } else {
      showResults();
    }
  }, 1600);
}

function showResults() {
  document.getElementById('quiz-screen').classList.add('hidden');
  const res = document.getElementById('results-screen');
  res.classList.remove('hidden');
  const percent = Math.round((score / 15) * 100);
  document.getElementById('score').textContent = percent + "%";
  let msg = percent >= 80 ? "You really know this nigga... that's love fr" :
            percent >= 60 ? "Aight you know some shit about dae" :
            percent >= 40 ? "Mid. Study up on dae" : "You don't know dae at all nigga 😂 Go touch grass";
  document.getElementById('message').textContent = msg;
}

function restartQuiz() {
  document.getElementById('results-screen').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
}

function endQuiz() {
  showResults();
}

window.onload = () => {
  createParticles();
};
</script>
</body>
</html>
